# Deploy nichecore (Next.js 16) to Google Cloud Run on every push to main.
#
# AUTH OPTIONS
# ------------
# Preferred: Workload Identity Federation (keyless). Set repo secrets:
#   GCP_PROJECT_ID                e.g. naturecure-prod
#   GCP_WORKLOAD_IDENTITY_PROVIDER e.g. projects/123456789/locations/global/workloadIdentityPools/github/providers/github
#   GCP_SERVICE_ACCOUNT            e.g. cloud-run-deployer@naturecure-prod.iam.gserviceaccount.com
#
# Fallback: a JSON service-account key in secret GCP_SA_KEY. The auth step
# below auto-prefers WIF when the provider secret is present; otherwise it
# uses the key.
#
# See docs/DEPLOY_CLOUDRUN.md for the one-time bootstrap commands.

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "nichecore/**"
      - ".github/workflows/deploy-cloudrun.yml"
  workflow_dispatch:

concurrency:
  group: cloudrun-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation
  statuses: write   # for the commit-status callback at the end

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip deploy]') }}
    env:
      REGION: us-central1
      SERVICE: nichecore
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF preferred, SA key fallback)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Submit Cloud Build (build + push + deploy)
        id: build
        run: |
          set -euo pipefail
          gcloud builds submit \
            --config nichecore/cloudbuild.yaml \
            --substitutions=_REGION=${REGION},SHORT_SHA=${GITHUB_SHA::7} \
            ./nichecore

      - name: Resolve deployed URL
        id: url
        run: |
          URL=$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Deployed → ${URL}"

      - name: Post commit status with deploy URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.url.outputs.url }}";
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha:   context.sha,
              state: "success",
              target_url: url,
              context: "cloud-run/deploy",
              description: `Live at ${url}`,
            });
