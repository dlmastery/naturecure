# Cloud Build config — builds the nichecore container, pushes it to Artifact
# Registry, then deploys it to Cloud Run.
#
# Substitutions (override with --substitutions=_KEY=value):
#   _REGION   GCP region for Artifact Registry + Cloud Run   (default: us-central1)
#   _REPO     Artifact Registry repo name                    (default: nichecore)
#   _SERVICE  Cloud Run service name                         (default: nichecore)
#   _IMAGE    Fully-qualified image tag                       (computed)
#
# Run from repo root:
#   gcloud builds submit --config nichecore/cloudbuild.yaml ./nichecore
#
# Required APIs: run.googleapis.com, cloudbuild.googleapis.com,
#                artifactregistry.googleapis.com
# Required IAM (on the Cloud Build service account):
#   roles/run.admin, roles/iam.serviceAccountUser,
#   roles/artifactregistry.writer

substitutions:
  _REGION: us-central1
  _REPO: nichecore-images
  _SERVICE: nichecore
  # Image path is inlined directly in the steps below (Cloud Build does not
  # recursively expand nested user-defined substitutions). Uses BUILD_ID
  # (always populated, including for manual submits) as the tag.

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  # Permit ad-hoc --substitutions overrides without breaking on unmatched keys.
  substitution_option: ALLOW_LOOSE

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app:${BUILD_ID}

steps:
  # 1. Build the container (build context = ./nichecore, passed on the CLI)
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app:${BUILD_ID}
      - --cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app:${BUILD_ID}
      - .

  # 2. Push to Artifact Registry
  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app:${BUILD_ID}"]

  # 3. Deploy to Cloud Run
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app:${BUILD_ID}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --port=8080
      - --max-instances=3
      - --concurrency=80
      - --timeout=60s
      - --set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1

timeout: 1200s
